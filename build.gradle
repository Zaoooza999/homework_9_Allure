plugins {
    id 'java'
    id 'io.qameta.allure' version '3.1.0'

}

group = 'org.example'
version = '1.0-SNAPSHOT'

allure {
    report {//секция репорта
        version.set("2.38.1") //версия Allure Report (https://github.com/allure-framework/allure2)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation (
            'org.junit.jupiter:junit-jupiter:5.10.3',
            'com.codeborne:selenide:7.15.1'
    )
    testImplementation ('io.qameta.allure:allure-selenide:2.33.0')
}

test {
    useJUnitPlatform()
    systemProperties(System.getProperties())
}