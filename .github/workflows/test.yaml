name: Test
on: [push]
jobs:
  test:
    # где запускаем
    runs-on: ubuntu-latest
    # что делаем
    steps:
      # выкачиваем репозиторий
      - uses: actions/checkout@v3
      # добавляем права на gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      # настраиваем java
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      # запускаем тесты
      - run: ./gradlew clean test
